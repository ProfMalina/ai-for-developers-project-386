name: backend-ci

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/**'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run tests
        working-directory: backend
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Generate coverage report
        working-directory: backend
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.html
        if: always()

      - name: Check test coverage
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Test coverage: ${COVERAGE}%"
          # Keep CI aligned with the repository's current tested baseline.
          # Higher coverage expansion is tracked separately in the backend
          # testing issue and should be raised deliberately with added tests.
          if (( $(echo "$COVERAGE < 18" | bc -l) )); then
            echo "Coverage is below 18%!"
            exit 1
          fi

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

      - name: Check Go formatting
        working-directory: backend
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Build check
        working-directory: backend
        run: go build -v ./...
