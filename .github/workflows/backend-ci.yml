name: backend-ci

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - 'Makefile'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/**'
      - 'Makefile'
      - '.github/workflows/backend-ci.yml'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: booking_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d booking_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: backend
        run: go mod download

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/booking_db?sslmode=disable
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/booking_db?sslmode=disable
        run: go test ./... -v -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          working-directory: backend
          args: --config=.golangci.yml --timeout=5m

      - name: Generate coverage report
        working-directory: backend
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.html
        if: always()

      - name: Check test coverage
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Test coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 30" | bc -l) )); then
            echo "Coverage is below 30%!"
            exit 1
          fi

      - name: Check Go formatting
        working-directory: backend
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Build check
        working-directory: backend
        run: go build -v ./...
