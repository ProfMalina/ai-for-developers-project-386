version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - wastedassign
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable:
        - shadow
    misspell:
      locale: US
